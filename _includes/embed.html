<div class="embed" style="padding-top:{{ include.aspect | default:"100%" }}">
<iframe class="embed-iframe" src="{{ include.url }}" title="{{ include.title }}"
  {% if include.iframeargs == "youtube" %}
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen
  {% elsif include.iframeargs == "vimeo" %}
    webkitallowfullscreen mozallowfullscreen allowfullscreen
  {% else %}
    {{ include.iframeargs }}
  {% endif %}
>{{ include.content }}</iframe>
</div>
